<form id="form">
  <label for="username">Username:</label><br>

  <label for="email">Email:</label><br>
  <input type="text" id="email" name="email"><br><br>

   <textarea rows="4" cols="50" id="poruka" name="poruka"></textarea><br><br>
  <button onclick="posalji()">Submit</button>

<script>
function posalji(){
    // 1. OBAVEZNO: Spreči osvežavanje stranice (browser default behavior)
    event.preventDefault();

    // 2. SKLONI zagrade kod .value (to nije funkcija nego svojstvo)
    var username = document.getElementById("username").value;
    var email = document.getElementById("email").value;
    var poruka = document.getElementById("poruka").value;

if (username === "" || email === "" || poruka === "") {
  alert("Popunite sva polja!");
}
else{
    console.log("Korisnik:", username);
    console.log("Email:", email);
    console.log("Poruka:", poruka);
    alert("Poruka uspesno poslata!");
}
}
